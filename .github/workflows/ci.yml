name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true


jobs:
  validate-stow:
    name: Validate Stow layout
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Install Stow
        run: sudo apt-get update && sudo apt-get install -y stow

      - name: Dry-run stow
        run: |
          set -euo pipefail
          HOME_TEST="$RUNNER_TEMP/home"
          mkdir -p "$HOME_TEST"
          stow -n -v --target="$HOME_TEST" --dotfiles .

  format-yaml-json:
    name: Check YAML, JSON formatting
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Setup node
      - uses: actions/setup-node@v6
        with:
          node-version: lts/*

      - name: Prettier format check
        run: npx prettier --check --no-error-on-unmatched-pattern "**/*.{yml,yaml,json}"
  
  lint-toml:
    name: Lint TOML
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Setup Taplo
        uses: uncenter/setup-taplo@v2
        with:
          version: "0.10.0"

      - name: Validate & check formatting
        run: |
          set -euo pipefail
          taplo check
          taplo fmt --check
    
  lint-markdown:
    name: Lint Markdown Files
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Lint Markdown
        uses: DavidAnson/markdownlint-cli2-action@v23
        with:
          globs: "**/*.md"
          fix: false
        continue-on-error: true


  lint-lua:
    name: Lint Lua Files
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Install Lua tools
        run: |
          sudo apt-get update
          sudo apt-get install -y luarocks
          cargo install stylua

      - name: Check Lua formatting with StyLua
        run: |
          stylua --check dot-config/nvim/ || echo "Lua formatting issues found"

  shellcheck:
    name: Lint Shell Scripts
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Run ShellCheck
        uses: ludeeus/action-shellcheck@master
        env:
          SHELLCHECK_OPTS: -e SC1090 -e SC1091

  lint-fish:
    name: Lint fish scripts
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v7
      
      - name: Install Fish
        uses: fish-actions/install-fish@v1
      
      - name: Syntax check
        uses: fish-actions/syntax-check@v1

  security-scan:
    name: Security Scan
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v7
        with:
          fetch-depth: 0

      - name: Gitleaks
        uses: gitleaks/gitleaks-action@v3
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
       
      - name: Check for hardcoded secrets
        run: |
          echo "Scanning for potential secrets..."
          
          if grep -rn --include="*.sh" --include="*.zsh" --include=".zshrc" \
            -E "(password|secret|api_key|token)[\s]*=[\s]*['\"][^'\"]+['\"]" .; then
            echo "❌ ::error:: Hardcoded secrets detected. Review matches and remove."
            
            exit 1
          fi
          echo "No hardcoded secrets found"
